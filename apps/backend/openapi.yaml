openapi: 3.0.0
info:
  title: Self-Management API
  description: REST API for managing users and tasks in the self-management application.
  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: Local development server

paths:
  /health:
    get:
      summary: Health check
      description: Returns OK if the server is running.
      responses:
        '200':
          description: Server is up and running
          content:
            text/plain:
              schema:
                type: string
                example: OK

  /users:
    get:
      summary: Get all users
      responses:
        '200':
          description: A list of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '500':
          $ref: '#/components/responses/InternalServerError'
    
    post:
      summary: Create a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Email already exists
        '500':
          $ref: '#/components/responses/InternalServerError'

  /users/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
        description: The user ID
    
    get:
      summary: Get a user by ID
      responses:
        '200':
          description: User details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    
    put:
      summary: Update a user completely
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModifyUserRequest'
      responses:
        '200':
          description: User updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
          
    delete:
      summary: Delete a user
      responses:
        '204':
          description: User deleted successfully
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /users/{id}/tasks:
    get:
      summary: Get all tasks for a specific user
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: The user ID
      responses:
        '200':
          description: A list of tasks belonging to the user
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Task'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /tasks:
    get:
      summary: Get all tasks across all users
      responses:
        '200':
          description: A list of all tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Task'
        '500':
          $ref: '#/components/responses/InternalServerError'
          
    post:
      summary: Create a new task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskRequest'
      responses:
        '201':
          description: Task created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /tasks/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
        description: The task ID
        
    get:
      summary: Get a task by ID
      responses:
        '200':
          description: Task details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
          
    delete:
      summary: Delete a task
      responses:
        '204':
          description: Task deleted successfully
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /tasks/{id}/complete:
    post:
      summary: Mark a task as completed
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: The task ID
      responses:
        '200':
          description: Task marked as completed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    
    patch:
      summary: Mark a task as completed (alias for POST)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Task marked as completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "Alice Johnson"
        email:
          type: string
          format: email
          example: "alice@example.com"
        phoneNumber:
          type: string
          example: "555-0123"
        createdAt:
          type: string
          format: date-time
          example: "2024-02-11T20:30:00Z"
          
    CreateUserRequest:
      type: object
      required:
        - name
        - email
        - password
      properties:
        name:
          type: string
          example: "Alice Johnson"
        email:
          type: string
          format: email
          example: "alice@example.com"
        phoneNumber:
          type: string
          example: "555-0123"
        password:
          type: string
          format: password
          example: "superSecretPassword!"

    ModifyUserRequest:
      type: object
      properties:
        name:
          type: string
          example: "Alice J. Smith"
        email:
          type: string
          format: email
          example: "alice.smith@example.com"
        phoneNumber:
          type: string
          example: "555-9999"

    Task:
      type: object
      properties:
        id:
          type: integer
          example: 101
        userId:
          type: integer
          example: 1
        title:
          type: string
          example: "Learn Go"
        description:
          type: string
          example: "Read the official documentation"
        isCompleted:
          type: boolean
          example: false
        createdAt:
          type: string
          format: date-time
          example: "2024-02-11T20:30:00Z"
        deletedAt:
          type: string
          format: date-time
          nullable: true

    CreateTaskRequest:
      type: object
      required:
        - userId
        - title
      properties:
        userId:
          type: integer
          example: 1
        title:
          type: string
          example: "Learn Go"
        description:
          type: string
          example: "Read the official documentation"

  responses:
    BadRequest:
      description: Invalid request data or parameters
    NotFound:
      description: The requested resource was not found
    InternalServerError:
      description: Something went wrong on the server
