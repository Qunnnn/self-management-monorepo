targets:
  $default:
    builders:
      # Freezed configuration: only run on entities and models
      freezed:
        generate_for:
          include:
            - lib/features/**/domain/entities/**.dart
            - lib/features/**/data/models/**.dart
            - lib/features/**/domain/models/**.dart
          exclude:
            - lib/**/index.dart
            - test/**

      # JSON Serializable configuration: only run on entities and models
      json_serializable:
        generate_for:
          include:
            - lib/features/**/domain/entities/**.dart
            - lib/features/**/data/models/**.dart
            - lib/features/**/domain/models/**.dart
          exclude:
            - lib/**/index.dart
            - test/**

      # Riverpod Generator configuration: only run on providers
      riverpod_generator:
        generate_for:
          include:
            - lib/features/**/presentation/providers/**.dart
          exclude:
            - lib/**/index.dart
            - test/**

global_options:
  freezed:
    options:
      union_value_case: snake
  
  json_serializable:
    options:
      field_rename: snake
      explicit_to_json: true

  riverpod_generator:
    options:
      {}
